limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

server {
    listen 8847;
    server_name _;
    server_tokens off;
    absolute_redirect off;
    root /usr/share/nginx/html;
    index index.html;

    auth_request /auth/check;
    error_page 401 = @login_redirect;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    location = /healthz {
        auth_request off;
        access_log off;
        return 204;
    }

    location = /auth/check {
        auth_request off;
        internal;
        proxy_pass http://127.0.0.1:8790/check;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
    }

    location = /login {
        auth_request off;
        proxy_pass http://127.0.0.1:8790/login;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /auth/login {
        auth_request off;
        limit_req zone=auth burst=10 nodelay;
        limit_except POST {
            deny all;
        }
        proxy_pass http://127.0.0.1:8790/login;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Content-Type $content_type;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass_request_body on;
    }

    location = /auth/logout {
        auth_request off;
        limit_except POST {
            deny all;
        }
        proxy_pass http://127.0.0.1:8790/logout;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass_request_body on;
    }

    location @login_redirect {
        return 302 /login?next=$request_uri;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /data/ {
        alias /app/data/;
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;
}
